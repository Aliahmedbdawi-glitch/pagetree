<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pagetree</title>
<meta name="description" content="A tiny, offline-first workspace. Pages inside pages, infinitely.">
<meta name="theme-color" content="#0E7C66">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css?v=24">
<script>
/* One-shot purge of stale PWA caches that kept the blank mindmap bug alive. */
(function () {
  var KEY = "pagetree-purged-v24";
  try {
    if (localStorage.getItem(KEY)) return;
    localStorage.setItem(KEY, "1");
  } catch (e) { return; }
  var done = function () { location.reload(); };
  var tasks = [];
  if ("serviceWorker" in navigator) {
    tasks.push(navigator.serviceWorker.getRegistrations().then(function (rs) {
      return Promise.all(rs.map(function (r) { return r.unregister(); }));
    }));
  }
  if (window.caches && caches.keys) {
    tasks.push(caches.keys().then(function (keys) {
      return Promise.all(keys.map(function (k) { return caches.delete(k); }));
    }));
  }
  if (tasks.length) Promise.all(tasks).then(done).catch(done);
  else done();
})();
</script>
</head>
<body>
<div id="app">
  <header id="topbar">
    <button id="menuBtn" class="iconbtn" title="Toggle sidebar" aria-label="Toggle sidebar">☰</button>
    <div id="brand" title="Pagetree">🌿 <span>Pagetree</span></div>
    <nav id="topnav">
      <button id="navUndo" class="iconbtn" title="Undo (Ctrl+Z)" aria-label="Undo" disabled>↶</button>
      <button id="navRedo" class="iconbtn" title="Redo (Ctrl+Y)" aria-label="Redo" disabled>↷</button>
      <button id="navAccount" class="navbtn" title="Account" hidden>👤</button>
      <button id="navTasks" class="navbtn" title="All tasks">✅ Tasks</button>
      <button id="navMap" class="navbtn" title="Map view">🗺️ Map</button>
    </nav>
  </header>

  <aside id="sidebar">
    <div id="tree"></div>
    <div id="sidebarActions">
      <button id="newRootBtn" class="ghostbtn">＋ New project</button>
      <button id="syncRecoverBtn" class="ghostbtn" title="Sync and recover missing pages">⇄ Sync / Recover</button>
      <button id="exportMdBtn" class="ghostbtn" title="Export workspace as Markdown">↓ Export MD</button>
      <button id="importMdBtn" class="ghostbtn" title="Import Markdown as new project(s)">↑ Import MD</button>
    </div>
  </aside>
  <div id="scrim"></div>

  <main id="main"></main>
  <div id="authGate" class="authgate" hidden></div>
  <div id="syncBadge" class="syncbadge" hidden></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
<script src="config.js?v=1"></script>
<script src="app.js?v=24"></script>
</body>
</html>
